name: Lidioma CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/lidioma_inventario_api
            git pull origin main
            /opt/lidioma_inventario_api/.venv/bin/uv sync --frozen
            /opt/lidioma_inventario_api/.venv/bin/python manage.py migrate --noinput
            /opt/lidioma_inventario_api/.venv/bin/python manage.py collectstatic --noinput --clear
            sudo systemctl restart gunicorn-inventario
            sudo systemctl restart nginx
